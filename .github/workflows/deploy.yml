name: Deploy idp

on:
  workflow_call:
    inputs:
      runner:
        description: "Self-hosted runner label"
        required: true
        type: string
      app_name:
        description: "Application name (directory and systemd service)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    env:
      APP_NAME: ${{ inputs.app_name }}
    steps:
      - name: Debug inputs
        run: |
          echo "runner: ${{ inputs.runner }}"
          echo "app_name: ${{ inputs.app_name }}"

      - name: Pull codice
        run: |
          cd /var/www/$APP_NAME
          git fetch origin
          git reset --hard origin/main

      - name: Installa dipendenze
        run: |
          cd /var/www/$APP_NAME
          ~/install.sh

      - name: Migrazione database
        run: |
          cd /var/www/$APP_NAME
          source .venv/bin/activate
          python manage.py migrate --noinput

      - name: Raccolta file statici
        run: |
          cd /var/www/$APP_NAME
          source .venv/bin/activate
          python manage.py collectstatic --noinput

      - name: Riavvia servizio
        run: sudo systemctl restart $APP_NAME
